name: Docker

on:
  # Nightly: after CI passes on main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

  # Stable: when a release is published
  release:
    types: [published]

  # Manual trigger
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. 0.2.0 or nightly)"
        required: true
        default: "nightly"

concurrency:
  group: docker-release
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build each arch natively in parallel (no QEMU emulation)
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    if: >
      (github.event_name != 'workflow_run' || (
        github.event.workflow_run.conclusion == 'success' &&
        !contains(github.event.workflow_run.head_commit.message, 'chore: release') &&
        !contains(github.event.workflow_run.head_commit.message, 'chore(release)')
      ))
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image name
        id: meta
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          # Sanitise platform for use as a tag suffix (linux/amd64 → linux-amd64)
          PLATFORM_TAG=$(echo "${{ matrix.platform }}" | tr '/' '-')
          echo "platform_tag=${PLATFORM_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.image }}:build-${{ steps.meta.outputs.platform_tag }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max
          labels: |
            org.opencontainers.image.title=Oxidized
            org.opencontainers.image.description=High-performance Minecraft Java Edition server in Rust
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha || github.sha }}
            org.opencontainers.image.licenses=MIT OR Apache-2.0

  # Merge per-arch images into a single multi-arch manifest
  merge:
    name: Merge multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tags
        shell: bash
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')

          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f1-2)
            TAGS="${IMAGE}:${VERSION} ${IMAGE}:${MINOR} ${IMAGE}:${MAJOR} ${IMAGE}:latest"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAGS="${IMAGE}:${{ inputs.tag }}"
          else
            SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
            TAGS="${IMAGE}:nightly ${IMAGE}:sha-${SHORT_SHA}"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "🐳 Tags: ${TAGS}"

      - name: Create and push multi-arch manifest
        run: |
          IMAGE="${{ steps.tags.outputs.image }}"
          SOURCES="${IMAGE}:build-linux-amd64 ${IMAGE}:build-linux-arm64"

          for TAG in ${{ steps.tags.outputs.tags }}; do
            docker buildx imagetools create -t "${TAG}" ${SOURCES}
            echo "✅ Created manifest: ${TAG}"
          done

      - name: Clean up build tags
        continue-on-error: true
        run: |
          echo "Build tags (build-linux-amd64, build-linux-arm64) can be ignored — they are intermediate artifacts."
