name: Security audit

on:
  push:
    paths: ['**/Cargo.toml', '**/Cargo.lock']
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: '0 8 * * 1'

permissions:
  checks: write
  contents: read

jobs:
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
