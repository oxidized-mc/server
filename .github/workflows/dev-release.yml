name: Dev Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: dev-release
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: oxidized

jobs:
  dev-release:
    name: Dev Release (${{ matrix.target }})
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      !contains(github.event.workflow_run.head_commit.message, 'chore: release') &&
      !contains(github.event.workflow_run.head_commit.message, 'chore(release)')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-dev-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-dev-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p oxidized-server

      - name: Determine version
        id: version
        shell: bash
        run: |
          BASE_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          DEV_VERSION="${BASE_VERSION}-dev.${SHORT_SHA}"
          echo "version=${DEV_VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          DIST_DIR="${{ env.BINARY_NAME }}-nightly-${{ matrix.target }}"
          mkdir -p "${DIST_DIR}"
          cp "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}" "${DIST_DIR}/"
          [ -f oxidized.toml ] && cp oxidized.toml "${DIST_DIR}/" || true
          cp LICENSE-MIT LICENSE-APACHE README.md "${DIST_DIR}/"
          tar czf "${DIST_DIR}.tar.gz" "${DIST_DIR}"
          echo "ASSET=${DIST_DIR}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $DIST_DIR = "${{ env.BINARY_NAME }}-nightly-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $DIST_DIR
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" "$DIST_DIR/"
          if (Test-Path "oxidized.toml") { Copy-Item "oxidized.toml" "$DIST_DIR/" }
          Copy-Item "LICENSE-MIT", "LICENSE-APACHE", "README.md" "$DIST_DIR/"
          Compress-Archive -Path "$DIST_DIR/*" -DestinationPath "$DIST_DIR.zip"
          echo "ASSET=$DIST_DIR.zip" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Generate SHA256
        shell: bash
        run: |
          if command -v sha256sum &>/dev/null; then
            sha256sum "${{ env.ASSET }}" > "${{ env.ASSET }}.sha256"
          else
            shasum -a 256 "${{ env.ASSET }}" > "${{ env.ASSET }}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BINARY_NAME }}-nightly-${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256

  publish:
    name: Publish nightly release
    needs: dev-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: Determine version
        id: version
        shell: bash
        run: |
          BASE_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "version=${BASE_VERSION}-dev.${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Generate combined SHA256SUMS
        working-directory: dist
        run: |
          cat *.sha256 > SHA256SUMS
          cat SHA256SUMS

      - name: Create or update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly (${{ steps.version.outputs.date }} — ${{ steps.version.outputs.short_sha }})"
          body: |
            **⚠️ Development build — not for production use.**

            Built from [`${{ steps.version.outputs.short_sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.event.workflow_run.head_sha }}) on ${{ steps.version.outputs.date }}.
            Version: `${{ steps.version.outputs.version }}`

            ## Download

            | Platform | Archive |
            |----------|---------|
            | Linux x86_64 (glibc) | `oxidized-nightly-x86_64-unknown-linux-gnu.tar.gz` |
            | Linux x86_64 (musl/static) | `oxidized-nightly-x86_64-unknown-linux-musl.tar.gz` |
            | Windows x86_64 | `oxidized-nightly-x86_64-pc-windows-msvc.zip` |
            | macOS x86_64 (Intel) | `oxidized-nightly-x86_64-apple-darwin.tar.gz` |
            | macOS aarch64 (Apple Silicon) | `oxidized-nightly-aarch64-apple-darwin.tar.gz` |

            Verify checksums: `sha256sum -c SHA256SUMS`

            ## Docker

            ```bash
            docker pull ghcr.io/${{ github.repository }}:nightly
            docker run -p 25565:25565 -v oxidized-data:/data ghcr.io/${{ github.repository }}:nightly
            ```
          prerelease: true
          make_latest: false
          files: dist/*
