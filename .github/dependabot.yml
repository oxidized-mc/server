version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 10
    labels:
      - "chore(deps)"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Only bump patch versions automatically for cryptography crates
      - dependency-name: "aes"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "rsa"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci"
