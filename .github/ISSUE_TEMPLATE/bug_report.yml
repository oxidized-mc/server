name: Bug Report
description: Report a crash, panic, incorrect behaviour, or protocol incompatibility
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        Please fill in as much detail as possible.

  - type: dropdown
    id: crate
    attributes:
      label: Affected crate
      options:
        - oxidized-server
        - oxidized-protocol
        - oxidized-nbt
        - oxidized-world
        - oxidized-game
        - Unknown / multiple
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Oxidized version / commit
      placeholder: "e.g. main@abc1234 or 0.3.1"
    validations:
      required: true

  - type: input
    id: client-version
    attributes:
      label: Minecraft client version (if applicable)
      placeholder: "e.g. 26.1"

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start server with …
        2. Connect with vanilla client
        3. …
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output / stack trace
      render: text

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS: Ubuntu 24.04
        Rust: 1.87.0
        CPU cores / RAM: 4 / 8 GB
